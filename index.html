<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Диагноз | Онлайн-игра</title>
    <style>
        :root {
            --bg-color: #121214;
            --panel-color: #1a1a1e;
            --accent-color: #ff3344;
            --text-color: #e2e2e6;
            --text-muted: #8a8a93;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--panel-color);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid #2a2a30;
        }

        h1 {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        h1 span {
            color: var(--accent-color);
        }

        p.subtitle {
            color: var(--text-muted);
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* Экраны игры (по умолчанию скрыты, кроме первого) */
        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        /* Формы и инпуты */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            background: #222226;
            border: 2px solid #2a2a30;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        /* Кнопки */
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            margin-bottom: 12px;
        }

        .btn-primary {
            background: var(--accent-color);
            color: #fff;
        }

        .btn-secondary {
            background: #2a2a30;
            color: var(--text-color);
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .divider {
            text-align: center;
            color: var(--text-muted);
            margin: 15px 0;
            font-size: 0.8rem;
            position: relative;
        }

        /* Стили для Лобби */
        .room-info {
            background: #222226;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 20px;
            border: 1px dashed var(--text-muted);
        }

        .player-list {
            list-style: none;
            margin-bottom: 25px;
        }

        .player-item {
            background: #222226;
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 0.95rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .player-item.host::after {
            content: 'Хост';
            font-size: 0.75rem;
            background: var(--accent-color);
            padding: 2px 6px;
            border-radius: 4px;
            color: white;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1><span>Д</span>ИАГНОЗ</h1>
        <p class="subtitle">Психологическая пати-игра</p>

        <!-- ЭКРАН 1: ВХОД / СОЗДАНИЕ ИГРЫ -->
        <div id="screen-auth" class="screen active">
            <div class="form-group">
                <label for="username">Ваше имя</label>
                <input type="text" id="username" placeholder="Доктор Хаус" autocomplete="off">
            </div>
            
            <button class="btn btn-primary" onclick="createRoom()">Создать кабинет</button>
            
            <div class="divider">или</div>
            
            <div class="form-group">
                <label for="room-code">Код комнаты</label>
                <input type="text" id="room-code" placeholder="XYZa12" autocomplete="off">
            </div>
            <button class="btn btn-secondary" onclick="joinRoom()">Войти по коду</button>
        </div>

        <!-- ЭКРАН 2: ЛОББИ ОЖИДАНИЯ -->
        <div id="screen-lobby" class="screen">
            <div class="room-info">
                Код комнаты: <strong id="display-room-code" style="color: var(--accent-color);">------</strong>
            </div>
            
            <label>Пациенты в очереди:</label>
            <ul class="player-list" id="players-container">
                <!-- Сюда скриптом будем добавлять игроков -->
                <li class="player-item host">Ожидание игроков...</li>
            </ul>

            <button class="btn btn-primary" id="start-game-btn" onclick="startGame()">Начать прием</button>
            <button class="btn btn-secondary" onclick="leaveRoom()">Выйти</button>
        </div>

        <!-- ЭКРАН 3: ИГРОВОЙ ПРОЦЕСС (заготовка на будущее) -->
        <div id="screen-game" class="screen">
            <h3 style="text-align: center; margin-bottom: 20px;">Идет прием...</h3>
            <p style="text-align: center; color: var(--text-muted);">Здесь будет чат, вопросы и выбор диагноза.</p>
        </div>
    </div>

    <script>
        // Простейшая логика переключения экранов для теста
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function createRoom() {
            const name = document.getElementById('username').value.trim();
            if (!name) return alert('Введите имя!');
            
            // Временно генерируем фейковый код, пока нет бэкенда
            const fakeCode = Math.random().toString(36).substring(2, 8).toUpperCase();
            document.getElementById('display-room-code').textContent = fakeCode;
            
            // Очищаем список и добавляем хоста
            const container = document.getElementById('players-container');
            container.innerHTML = `<li class="player-item host">${name}</li>`;
            
            showScreen('screen-lobby');
        }

        function joinRoom() {
            const name = document.getElementById('username').value.trim();
            const code = document.getElementById('room-code').value.trim();
            if (!name || !code) return alert('Заполните имя и код комнаты!');
            
            document.getElementById('display-room-code').textContent = code.toUpperCase();
            
            const container = document.getElementById('players-container');
            container.innerHTML = `
                <li class="player-item host">Создатель Комнаты</li>
                <li class="player-item">${name} (Вы)</li>
            `;
            
            // Обычный игрок не может запустить игру, прячем кнопку
            document.getElementById('start-game-btn').style.display = 'none';
            
            showScreen('screen-lobby');
        }

        function leaveRoom() {
            showScreen('screen-auth');
            document.getElementById('start-game-btn').style.display = 'block';
        }

        function startGame() {
            showScreen('screen-game');
        }
    </script>
</body>
</html>
