<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINDFAKED | Онлайн-игра</title>
    <style>
        :root {
            --bg-color: #121214;
            --panel-color: #1a1a1e;
            --accent-color: #ff3344;
            --text-color: #e2e2e6;
            --text-muted: #8a8a93;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--panel-color);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid #2a2a30;
        }

        h1 { 
            font-size: 2.2rem; 
            text-align: center; 
            margin-bottom: 10px; 
            letter-spacing: 2px; 
            font-weight: 900; 
        }
        
        h1 span { color: var(--accent-color); }
        
        p.subtitle { 
            color: var(--text-muted); 
            text-align: center; 
            font-size: 0.9rem; 
            margin-bottom: 30px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }

        .screen { display: none; }
        .screen.active { display: block; }
        
        .form-group { margin-bottom: 20px; }
        
        label { 
            display: block; 
            font-size: 0.85rem; 
            color: var(--text-muted); 
            margin-bottom: 8px; 
            text-transform: uppercase; 
        }

        input[type="text"] {
            width: 100%; 
            padding: 14px; 
            background: #222226; 
            border: 2px solid #2a2a30; 
            border-radius: 8px; 
            color: #fff; 
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        
        input[type="text"]:focus { 
            outline: none; 
            border-color: var(--accent-color); 
        }

        .btn { 
            display: block; 
            width: 100%; 
            padding: 14px; 
            border: none; 
            border-radius: 8px; 
            font-size: 1rem; 
            font-weight: bold; 
            cursor: pointer; 
            transition: transform 0.1s, opacity 0.2s; 
            margin-bottom: 12px; 
        }
        
        .btn-primary { background: var(--accent-color); color: #fff; }
        .btn-secondary { background: #2a2a30; color: var(--text-color); }
        .btn:hover { opacity: 0.9; }
        .btn:active { transform: scale(0.98); }
        
        .divider { text-align: center; color: var(--text-muted); margin: 15px 0; font-size: 0.8rem; }

        .room-info { 
            background: #222226; 
            padding: 15px; 
            border-radius: 8px; 
            text-align: center; 
            font-size: 1.2rem; 
            margin-bottom: 20px; 
            border: 1px dashed var(--text-muted); 
        }
        
        .player-list { list-style: none; margin-bottom: 25px; }
        
        .player-item { 
            background: #222226; 
            padding: 12px 15px; 
            border-radius: 6px; 
            margin-bottom: 8px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        
        .player-item.host::after { 
            content: 'ДОКТОР'; 
            font-size: 0.75rem; 
            background: var(--accent-color); 
            padding: 2px 6px; 
            border-radius: 4px; 
            color: white; 
            font-weight: bold; 
        }

        /* ИГРОВОЙ ИНТЕРФЕЙС И ЧАТ */
        .role-card { 
            background: #222226; 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            border-left: 4px solid var(--accent-color); 
        }
        
        .chat-box { 
            background: #121214; 
            height: 280px; 
            border-radius: 8px; 
            border: 1px solid #2a2a30; 
            padding: 15px; 
            overflow-y: auto; 
            margin-bottom: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
        }
        
        .msg { 
            padding: 8px 12px; 
            border-radius: 6px; 
            max-width: 85%; 
            font-size: 0.95rem; 
            word-break: break-word; 
        }
        
        .msg.doctor-msg { 
            background: #ff334415; 
            border: 1px solid #ff334444; 
            align-self: flex-start; 
        }
        
        .msg.patient-msg { 
            background: #222226; 
            border: 1px solid #2a2a30;
            align-self: flex-end; 
        }
        
        .msg .sender { 
            font-size: 0.75rem; 
            color: var(--text-muted); 
            margin-bottom: 3px; 
            font-weight: bold; 
        }
        
        .chat-input-group { display: flex; gap: 8px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>MIND<span>FAKE</span>D</h1>
        <p class="subtitle">Психологическая пати-игра</p>

        <!-- ЭКРАН 1: АВТОРИЗАЦИЯ -->
        <div id="screen-auth" class="screen active">
            <div class="form-group">
                <label for="username">Ваше имя в палате</label>
                <input type="text" id="username" placeholder="Пациент #1" autocomplete="off">
            </div>
            <button class="btn btn-primary" onclick="createRoom()">Создать кабинет</button>
            <div class="divider">или</div>
            <div class="form-group">
                <label for="room-code">Код комнаты</label>
                <input type="text" id="room-code" placeholder="ABCD" autocomplete="off">
            </div>
            <button class="btn btn-secondary" onclick="joinRoom()">Войти по коду</button>
        </div>

        <!-- ЭКРАН 2: ЛОББИ -->
        <div id="screen-lobby" class="screen">
            <div class="room-info">
                Код комнаты: <strong id="display-room-code" style="color: var(--accent-color); letter-spacing: 2px;">----</strong>
            </div>
            <label>Очередь на прием:</label>
            <ul class="player-list" id="players-container"></ul>
            <button class="btn btn-primary" id="start-game-btn" style="display: none;" onclick="sendStartGame()">Начать прием</button>
            <button class="btn btn-secondary" onclick="leaveRoom()">Выйти в меню</button>
        </div>

        <!-- ЭКРАН 3: ИГРА -->
        <div id="screen-game" class="screen">
            <div class="role-card">
                <div id="role-title" style="font-weight: bold; font-size: 1.1rem; margin-bottom: 5px;">Ваша роль: Определение...</div>
                <div id="role-desc" style="color: var(--text-muted); font-size: 0.9rem;">Ожидаем диагноз от главврача.</div>
            </div>

            <div class="chat-box" id="chat-box">
                <!-- Сюда скриптом валятся сообщения -->
            </div>

            <div class="chat-input-group">
                <input type="text" id="chat-input" placeholder="Введите ответ или вопрос..." onkeydown="if(event.key === 'Enter') sendMsg()">
                <button class="btn btn-primary" style="width: auto; margin-bottom: 0; padding: 0 20px;" onclick="sendMsg()">></button>
            </div>
        </div>
    </div>

    <script>
        let ws;

        // ВАЖНО: Замени строчку ниже на свой адрес из Amvera, когда скопируешь его!
        // Пример: 'wss://mindfaked-fidelity-12345.amvera.media'
        const AMVERA_URL = 'wss://сюда-вставь-свой-адрес.amvera.media';

        const SERVER_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'ws://localhost:3000'
            : AMVERA_URL; 

        function connectWebSocket(callback) {
            if (ws && ws.readyState === WebSocket.OPEN) return callback();
            
            ws = new WebSocket(SERVER_URL);

            ws.onopen = () => {
                console.log('Успешное подключение к серверу');
                callback();
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);

                if (data.type === 'ROOM_CREATED' || data.type === 'ROOM_JOINED') {
                    document.getElementById('display-room-code').textContent = data.code;
                    showScreen('screen-lobby');
                }

                if (data.type === 'UPDATE_PLAYERS') {
                    const container = document.getElementById('players-container');
                    container.innerHTML = '';
                    data.players.forEach(player => {
                        const li = document.createElement('li');
                        li.className = `player-item ${player.isHost ? 'host' : ''}`;
                        li.textContent = player.name;
                        container.appendChild(li);
                    });
                }

                if (data.type === 'SET_HOST') {
                    document.getElementById('start-game-btn').style.display = 'block';
                }

                if (data.type === 'GAME_STARTED') {
                    showScreen('screen-game');
                    const title = document.getElementById('role-title');
                    const desc = document.getElementById('role-desc');

                    if (data.role === 'doctor') {
                        title.textContent = "Вы — ДОКТОР ХАУС";
                        title.style.color = "var(--accent-color)";
                        desc.textContent = "Задавайте пациентам вопросы в чате. Ваша цель — понять их общий тайный бзик.";
                    } else {
                        title.textContent = "Вы — ПАЦИЕНТ";
                        title.style.color = "#33aaff";
                        desc.innerHTML = `<strong>Ваш общий диагноз:</strong> ${data.diagnosis}<br><br><span style="font-size:0.8rem;color:var(--text-muted);">Отвечайте на вопросы доктора, подыгрывая этому диагнозу, но не палите его прямо!</span>`;
                    }
                }

                if (data.type === 'CHAT_MSG') {
                    const chatBox = document.getElementById('chat-box');
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `msg ${data.isDoctor ? 'doctor-msg' : 'patient-msg'}`;
                    
                    msgDiv.innerHTML = `
                        <div class="sender">${data.sender} (${data.isDoctor ? 'Доктор' : 'Пациент'})</div>
                        <div>${data.text}</div>
                    `;
                    chatBox.appendChild(msgDiv);
                    chatBox.scrollTop = chatBox.scrollHeight;
                }

                if (data.type === 'ERROR') {
                    alert(data.message);
                }
            };

            ws.onclose = () => {
                console.log('Сервер разорвал соединение');
                showScreen('screen-auth');
            };
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function createRoom() {
            const name = document.getElementById('username').value.trim();
            if (!name) return alert('Введите имя!');
            connectWebSocket(() => ws.send(JSON.stringify({ type: 'CREATE_ROOM', name: name })));
        }

        function joinRoom() {
            const name = document.getElementById('username').value.trim();
            const code = document.getElementById('room-code').value.trim();
            if (!name || !code) return alert('Заполните имя и код комнаты!');
            connectWebSocket(() => ws.send(JSON.stringify({ type: 'JOIN_ROOM', name: name, code: code })));
        }

        function sendStartGame() {
            if (ws) ws.send(JSON.stringify({ type: 'START_GAME' }));
        }

        function sendMsg() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text || !ws) return;

            ws.send(JSON.stringify({ type: 'SEND_MSG', text: text }));
            input.value = '';
        }

        function leaveRoom() {
            if (ws) ws.close();
            showScreen('screen-auth');
        }
    </script>
</body>
</html>
